name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Install Application Dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt -t .

      - name: Install CDK Dependencies
        working-directory: ./backend/infra
        run: pip install -r requirements.txt

      - name: Deploy Infrastructure (Plan B - Direct CloudFormation)
        working-directory: ./backend/infra
        run: |
          # Clean output directory
          rm -rf cdk.out
          
          # Generate the CloudFormation template safely into cdk.out
          npx cdk synth TypingProStack --output cdk.out
          
          # Deploy using the clean template file generated by CDK
          aws cloudformation deploy \
            --template-file cdk.out/TypingProStack.template.json \
            --stack-name TypingProStack \
            --capabilities CAPABILITY_IAM \
            --region ap-northeast-1

      - name: Package and Update Lambda Code (Plan B - No S3)
        working-directory: ./backend
        run: |
          # Create a zip containing all dependencies and source code
          zip -r ../function.zip . -x "infra/*" "cdk.out/*" "*.pyc" "__pycache__/*"
          
          # Wait a few seconds for the function to be created/updated by CDK
          sleep 10
          
          # Directly update the Lambda function code via AWS CLI
          aws lambda update-function-code \
            --function-name TypingProFunction \
            --zip-file fileb://../function.zip \
            --region ap-northeast-1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          # NEXT_PUBLIC_ が付いた環境変数はブラウザ側に公開される
          # 付いていないもの サーバー側だけで使える
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel
        working-directory: ./frontend
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
